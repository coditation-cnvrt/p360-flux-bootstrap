# Test app Helm chart source (points to test-tagged chart in ACR)
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: plant360-test-chart
  namespace: flux-system
spec:
  interval: 5m
  url: oci://${ACR_LOGIN_SERVER}/helm/plant360-test
  ref:
    tag: "${APP_CHART_TAG}"
  secretRef:
    name: acr-pull-token
---
# Test HelmRelease — targets default namespace, uses test-values ConfigMap
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plant360-test
  namespace: flux-system
spec:
  interval: 10m
  releaseName: plant360-test
  targetNamespace: default
  chartRef:
    kind: OCIRepository
    name: plant360-test-chart
    namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: test-values
      valuesKey: values.yaml

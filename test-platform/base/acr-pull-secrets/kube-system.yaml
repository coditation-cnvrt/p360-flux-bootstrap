apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
---
apiVersion: v1
kind: Secret
metadata:
  name: acr-pull-token
  namespace: kube-system
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"${ACR_LOGIN_SERVER}":{"auth":"${ACR_AUTH_B64}"}}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: kube-system
imagePullSecrets:
  - name: acr-pull-token

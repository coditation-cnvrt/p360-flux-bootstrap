apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kedacore
  namespace: flux-system
spec:
  interval: 5m
  url: https://kedacore.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: flux-system
spec:
  interval: 10m
  releaseName: keda
  targetNamespace: keda
  chart:
    spec:
      chart: keda
      version: 2.16.1
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
  install:
    createNamespace: false
  values:
    image:
      keda:
        registry: ghcr.io
        repository: kedacore/keda
        tag: 2.16.1
      metricsApiServer:
        registry: ghcr.io
        repository: kedacore/keda-metrics-apiserver
        tag: 2.16.1
      webhooks:
        registry: ghcr.io
        repository: kedacore/keda-admission-webhooks
        tag: 2.16.1
